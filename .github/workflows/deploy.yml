name: Deploy to EC2

# Trigger the workflow only when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Required permissions for the GitHub token to push images to the Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout the repository code into the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment for testing
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Test: Install dependencies using the lockfile and run tests. 
      # If this fails, the pipeline stops immediately.
      - name: Run Tests
        run: |
          cd dev-ops/DeployReady/app
          npm ci
          npm test

      # 4. Authenticate with GitHub Container Registry (GHCR) using the automatic GitHub token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build the Docker image and tag it uniquely with the Git commit SHA
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/deployready-kora-app:${{ github.sha }}

      # 6. Open the AWS Security Group for the GitHub Runner
      - name: Authorize GitHub Runner IP in Security Group
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Authorizing IP: $RUNNER_IP"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${RUNNER_IP}/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 7. Connect to the EC2 server via SSH, pull the new image, and run it
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Authenticate the EC2 server with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the exact image we just built
            docker pull ghcr.io/${{ github.repository_owner }}/deployready-kora-app:${{ github.sha }}
            
            # Stop and remove the old container gracefully (ignoring errors if it doesn't exist yet)
            docker stop kora-app || true
            docker rm kora-app || true
            
            # Start the new container on port 80 (HTTP)
            docker run -d --name kora-app --restart unless-stopped -p 80:3000 -e PORT=3000 ghcr.io/${{ github.repository_owner }}/deployready-kora-app:${{ github.sha }}

      # 8. Close the AWS Security Group (Always runs, even if the deploy fails)
      - name: Revoke GitHub Runner IP from Security Group
        if: always() 
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Revoking IP: $RUNNER_IP"
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${RUNNER_IP}/32 \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}