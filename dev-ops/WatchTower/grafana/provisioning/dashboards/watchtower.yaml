# Auto-load JSON dashboards from the mounted folder on Grafana startup.
apiVersion: 1

providers:
  - name: 'WatchTower Dashboards'
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/dashboards/json
