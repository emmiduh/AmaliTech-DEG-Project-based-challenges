# WatchTower — unified observability stack (3 microservices + Prometheus + Grafana + Blackbox).
# Blackbox Exporter performs synthetic HTTP checks against /health so alerts can reflect true HTTP status
# without changing application business logic.
#
# Usage: `cp .env.example .env` then `docker compose up --build`

name: watchtower

networks:
  observability:
    driver: bridge

x-logging: &json-file-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  order-service:
    build:
      context: ./app/order-service
    restart: unless-stopped
    environment:
      PORT: ${ORDER_SERVICE_INTERNAL_PORT}
    ports:
      - "${ORDER_SERVICE_HOST_PORT}:${ORDER_SERVICE_INTERNAL_PORT}"
    networks: [observability]
    logging: *json-file-logging

  tracking-service:
    build:
      context: ./app/tracking-service
    restart: unless-stopped
    environment:
      PORT: ${TRACKING_SERVICE_INTERNAL_PORT}
    ports:
      - "${TRACKING_SERVICE_HOST_PORT}:${TRACKING_SERVICE_INTERNAL_PORT}"
    networks: [observability]
    logging: *json-file-logging

  notification-service:
    build:
      context: ./app/notification-service
    restart: unless-stopped
    environment:
      PORT: ${NOTIFICATION_SERVICE_INTERNAL_PORT}
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT}:${NOTIFICATION_SERVICE_INTERNAL_PORT}"
    networks: [observability]
    logging: *json-file-logging

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_HOST_PORT}:${PROMETHEUS_INTERNAL_PORT}"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [observability]
    logging: *json-file-logging
    depends_on:
      - order-service
      - tracking-service
      - notification-service

  grafana:
    image: grafana/grafana:10.4.5
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
    ports:
      - "${GRAFANA_HOST_PORT}:${GRAFANA_INTERNAL_PORT}"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards/json:ro
    networks: [observability]
    logging: *json-file-logging
    depends_on:
      - prometheus
