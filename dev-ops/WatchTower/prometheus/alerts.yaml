# WatchTower Prometheus alerting rules — loaded via prometheus.yml `rule_files`.
# Annotations use human-readable summary/description for on-call runbooks and Grafana alerting.

groups:
  - name: watchtower.rules
    interval: 30s
    rules:
      # ------------------------------------------------------------------
      # ServiceDown (critical)
      # ------------------------------------------------------------------
      - alert: ServiceDown
        expr: up{job=~"order-service|tracking-service|notification-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "WatchTower service is down ({{ $labels.job }})"
          description: >-
            Prometheus failed to scrape {{ $labels.job }} for more than 1 minute (up=0).
            The service container may have crashed or is unresponsive.

      # ------------------------------------------------------------------
      # HighErrorRate (warning)
      # Share of HTTP 5xx responses across all routes.
      # ------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum by (job) (rate(http_requests_total[5m])), 1e-6)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate on {{ $labels.job }}"
          description: >-
            More than 5% of measured HTTP requests returned a 5xx status for {{ $labels.job }} over the last 5 minutes.
            Inspect recent deploys, downstream dependencies, and saturation on the service.

      # ------------------------------------------------------------------
      # ServiceNotScraping (warning)
      # Checks if the timestamp of the last successful scrape is older than 2 minutes.
      # ------------------------------------------------------------------
      - alert: ServiceNotScraping
        expr: (time() - prometheus_target_last_scrape_timestamp_seconds{job=~"order-service|tracking-service|notification-service"}) > 120
        labels:
          severity: warning
        annotations:
          summary: "Prometheus metrics stale for {{ $labels.job }}"
          description: >-
            No metrics have been scraped from {{ $labels.job }} for over 2 minutes.
            Check if the /metrics endpoint is hanging or if the network is saturated.
