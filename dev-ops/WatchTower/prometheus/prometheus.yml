# Prometheus configuration for WatchTower — scrapes application /metrics and Blackbox /health probes.
# Targets use Docker Compose DNS names on the shared `observability` network (not localhost).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Application metrics (prom-client) — each job name matches the Compose service name for clean dashboards.
  - job_name: "order-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:3001"]

  - job_name: "tracking-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["tracking-service:3002"]

  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:3003"]

  # Synthetic checks against /health via Blackbox — enables alerts on true HTTP status without changing app code.
  - job_name: "blackbox-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://order-service:3001/health
          - http://tracking-service:3002/health
          - http://notification-service:3003/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      # Friendly label for dashboards/alerts (order-service, tracking-service, ...)
      - source_labels: [__param_target]
        regex: "http://([^:]+):.*"
        target_label: service
        replacement: "$1"

  # Prometheus self-metrics (optional but useful for ops dashboards).
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
