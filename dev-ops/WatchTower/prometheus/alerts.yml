# WatchTower Prometheus alerting rules — loaded via prometheus.yml `rule_files`.
# Annotations use human-readable summary/description for on-call runbooks and Grafana alerting.

groups:
  - name: watchtower.rules
    interval: 30s
    rules:
      # ------------------------------------------------------------------
      # ServiceDown (critical)
      # Blackbox probe_success == 0 means non-200 response, timeout, or connection failure on /health.
      # ------------------------------------------------------------------
      - alert: ServiceDown
        expr: probe_success{job="blackbox-health"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "WatchTower service health check failing ({{ $labels.service }})"
          description: >-
            Blackbox HTTP probe to /health for {{ $labels.service }} has been failing for more than one minute
            (probe_success=0). Check container logs, dependency availability, and upstream load balancers.

      # ------------------------------------------------------------------
      # HighErrorRate (warning)
      # Share of HTTP 5xx responses across all routes for each scraped application job.
      # ------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum by (job) (rate(http_requests_total[5m])), 1e-6)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate on {{ $labels.job }}"
          description: >-
            More than 5% of measured HTTP requests returned a 5xx status for job {{ $labels.job }} over the last 5 minutes.
            Inspect recent deploys, downstream dependencies, and saturation on the service.

      # ------------------------------------------------------------------
      # ServiceNotScraping (warning)
      # Prometheus `up` series missing or zero for application metrics jobs for >2 minutes.
      # ------------------------------------------------------------------
      - alert: ServiceNotScraping
        expr: up{job=~"order-service|tracking-service|notification-service"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus cannot scrape metrics for {{ $labels.job }}"
          description: >-
            The /metrics target for {{ $labels.job }} has been unreachable (up==0) for more than two minutes.
            This is distinct from a failing /health probe: the metrics endpoint or network path may be broken.
