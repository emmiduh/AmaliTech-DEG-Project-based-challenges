# Blackbox exporter modules used by Prometheus to probe /health with strict HTTP semantics.
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/1.0"]
      # Treat only HTTP 200 as healthy for WatchTower /health endpoints.
      valid_status_codes: [200]
      follow_redirects: false
      preferred_ip_protocol: ip4
